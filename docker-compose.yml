services:
  postgres:
    image: postgres:16-alpine
    container_name: raizes-postgres
    environment:
      POSTGRES_DB: raizes
      POSTGRES_USER: raizes
      POSTGRES_PASSWORD: raizes
    ports:
      - "5432:5432"
    volumes:
      - raizes_pgdata:/var/lib/postgresql/data

volumes:
  raizes_pgdata:
